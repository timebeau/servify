name = "servify-website"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# Serve static assets from the website source (apps/website)
[assets]
directory = "../website"
binding = "ASSETS"

[vars]
# Example: set additional environment variables if needed

# Routes for custom domains
routes = [
  { pattern = "www.servify.cloud/*", zone_id = "9c04c9244792160c8f6efad145dede5c" }
  { pattern = "servify.cloud/*", zone_id = "9c04c9244792160c8f6efad145dede5c" }
]
