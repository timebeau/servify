name = "servify-website"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# Serve static assets from the website source (apps/website)
[assets]
directory = "../website"
binding = "ASSETS"

[vars]
# Zone ID and routes configured via environment/secrets

# Routes are configured via CLOUDFLARE_ZONE_ID environment variable during deployment
# To deploy manually, set:
# export CLOUDFLARE_ZONE_ID=your_zone_id
# npx wrangler deploy --var CLOUDFLARE_ZONE_ID:your_zone_id
