# Example production-oriented security baseline.
# Do not commit real secrets into this file.

jwt:
  secret: "${SERVIFY_JWT_SECRET}"
  expires_in: "12h"

security:
  cors:
    enabled: true
    allowed_origins:
      - "https://app.example.com"
      - "https://ops.example.com"
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["Authorization", "Content-Type", "X-Request-ID"]
  rbac:
    enabled: true
  rate_limiting:
    enabled: true
    requests_per_minute: 120
    burst: 30
    key_header: ""
    whitelist_ips: []
    whitelist_keys: []
    paths:
      - enabled: true
        prefix: "/public/"
        requests_per_minute: 120
        burst: 30
      - enabled: true
        prefix: "/api/v1/ws"
        requests_per_minute: 40
        burst: 20
      - enabled: true
        prefix: "/api/v1/ai/query"
        requests_per_minute: 45
        burst: 15
      - enabled: true
        prefix: "/api/v1/ai/knowledge/"
        requests_per_minute: 10
        burst: 5
      - enabled: true
        prefix: "/api/v1/metrics/ingest"
        requests_per_minute: 180
        burst: 60
      - enabled: true
        prefix: "/api/"
        requests_per_minute: 90
        burst: 20

ai:
  openai:
    api_key: "${OPENAI_API_KEY}"

weknora:
  enabled: true
  api_key: "${WEKNORA_API_KEY}"

log:
  level: "info"
  format: "json"
  output: "both"

monitoring:
  enabled: true
