name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Verify formatting
        run: |
          mapfile -t files < <(git ls-files '*.go')
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          unformatted=$(gofmt -l "${files[@]}")
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go mod tidy check
        run: |
          go -C apps/server mod tidy
          git diff --exit-code -- go.work.sum apps/server/go.mod apps/server/go.sum

      - name: Go vet
        run: go -C apps/server vet ./...

      - name: Run unit tests with coverage
        env:
          TEST_COVERAGE_TARGET: "5"
        run: ./scripts/run-tests.sh

      - name: Run Go race tests
        env:
          CGO_ENABLED: "1"
        run: ./scripts/run-go-race-tests.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: scripts/test-results
          if-no-files-found: ignore

      - name: Build server binaries
        run: make build

      - name: Build WeKnora CLI
        run: make build-weknora

  module-checks:
    name: Module Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Test modular packages
        run: |
          go test \
            ./apps/server/internal/modules/... \
            ./apps/server/internal/platform/... \
            ./apps/server/internal/services/... \
            ./apps/server/internal/handlers/...

      - name: Build modular entrypoints
        run: |
          go build \
            ./apps/server/internal/modules/... \
            ./apps/server/internal/services \
            ./apps/server/internal/handlers \
            ./apps/server/cmd/server

  sdk-checks:
    name: SDK Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm -C sdk ci --no-audit --no-fund

      - name: Lint SDK
        run: npm -C sdk run lint

      - name: Build SDK
        run: npm -C sdk run build

      - name: Typecheck SDK
        run: npm -C sdk run typecheck

      - name: Test SDK
        run: npm -C sdk run test

      - name: Sync SDK to demo
        run: |
          chmod +x scripts/sync-sdk-to-demo.sh
          ./scripts/sync-sdk-to-demo.sh

      - name: Verify generated assets manifest
        run: |
          chmod +x scripts/verify-generated-assets.sh
          ./scripts/verify-generated-assets.sh

      - name: Verify generated assets are committed
        run: |
          chmod +x scripts/check-generated-drift.sh
          ./scripts/check-generated-drift.sh \
            "SDK generated assets" \
            "sh scripts/regenerate-generated-assets.sh" \
            apps/demo-web/sdk

  docs-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        run: npm -C docs ci --no-audit --no-fund

      - name: Verify docs lockfile is committed
        run: |
          chmod +x scripts/check-generated-drift.sh
          ./scripts/check-generated-drift.sh \
            "Docs lockfile" \
            "npm -C docs ci --no-audit --no-fund" \
            docs/package-lock.json

      - name: Generate API docs
        run: go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g apps/server/cmd/server/main.go -o docs/generated/api

      - name: Build docs site
        run: npm -C docs run build

      - name: Verify docs generated assets are committed
        run: |
          chmod +x scripts/check-generated-drift.sh
          ./scripts/check-generated-drift.sh \
            "Docs generated assets" \
            "sh scripts/regenerate-generated-assets.sh" \
            docs/generated/api \
            docs/package-lock.json

      - name: Upload docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/.vuepress/dist
          if-no-files-found: ignore

  script-checks:
    name: Script Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: |
          mapfile -t files < <(find scripts -type f -name '*.sh' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          bash -n "${files[@]}"

      - name: Validate repository hygiene
        run: |
          chmod +x scripts/check-repo-hygiene.sh
          ./scripts/check-repo-hygiene.sh

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate module boundaries
        run: |
          chmod +x scripts/check-module-boundaries.sh
          ./scripts/check-module-boundaries.sh

  smoke-checks:
    name: Smoke Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm -C sdk ci --no-audit --no-fund

      - name: Run smoke suite
        run: |
          chmod +x scripts/run-smoke-tests.sh
          ./scripts/run-smoke-tests.sh

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - sdk-checks
      - docs-checks
      - script-checks
      - smoke-checks
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose version
        run: docker compose version

      - name: Compose up
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml up -d --build

      - name: Wait for health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run integration script
        env:
          SERVIFY_URL: http://localhost:8080
          WEKNORA_URL: http://localhost:9000
        run: |
          chmod +x scripts/test-weknora-integration.sh
          ./scripts/test-weknora-integration.sh

      - name: Dump compose logs
        if: failure()
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml down -v

  deploy-website-pages:
    name: Deploy Website Pages
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - sdk-checks
      - docs-checks
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT || 'servify-website' }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check secrets
        id: gate
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect website changes
        if: steps.gate.outputs.skip == 'false'
        id: detect
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$before" "$after" | grep -E '^apps/website/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Diagnose Cloudflare Pages context
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        run: |
          echo "CF_PAGES_PROJECT=$CF_PAGES_PROJECT"
          echo "CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:0:8}... (redacted)"
          echo "--- Listing Pages projects ---"
          npx wrangler pages project list 2>&1 || true
          echo "--- Checking target project ---"
          npx wrangler pages project get "$CF_PAGES_PROJECT" 2>&1 || true

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        run: npx wrangler pages deploy apps/website --project-name "$CF_PAGES_PROJECT" --commit-dirty=true
