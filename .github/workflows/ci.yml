name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Verify formatting
        run: |
          mapfile -t files < <(git ls-files '*.go')
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          unformatted=$(gofmt -l "${files[@]}")
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go mod tidy check
        run: |
          go -C apps/server mod tidy
          git diff --exit-code -- apps/server/go.mod apps/server/go.sum

      - name: Go vet
        run: go -C apps/server vet ./...

      - name: Run unit tests with coverage
        env:
          TEST_COVERAGE_TARGET: "5"
        run: ./scripts/run-tests.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: scripts/test-results
          if-no-files-found: ignore

      - name: Build server binaries
        run: make build

      - name: Build WeKnora CLI
        run: make build-weknora

  module-checks:
    name: Module Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Test modular packages
        run: |
          go test \
            ./apps/server/internal/modules/... \
            ./apps/server/internal/platform/... \
            ./apps/server/internal/services/... \
            ./apps/server/internal/handlers/...

      - name: Build modular entrypoints
        run: |
          go build \
            ./apps/server/internal/modules/... \
            ./apps/server/internal/services \
            ./apps/server/internal/handlers \
            ./apps/server/cmd/server

  sdk-checks:
    name: SDK Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm -C sdk ci --no-audit --no-fund

      - name: Lint SDK
        run: npm -C sdk run lint

      - name: Typecheck SDK
        run: npm -C sdk run typecheck

      - name: Test SDK
        run: npm -C sdk run test

      - name: Build SDK
        run: npm -C sdk run build

      - name: Sync SDK to demo
        run: |
          chmod +x scripts/sync-sdk-to-demo.sh
          ./scripts/sync-sdk-to-demo.sh

      - name: Verify generated assets are committed
        run: git diff --exit-code

  docs-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docs dependencies
        run: npm -C docs install --no-audit --no-fund

      - name: Build docs site
        run: npm -C docs run build

      - name: Upload docs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/.vuepress/dist
          if-no-files-found: ignore

  script-checks:
    name: Script Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: |
          mapfile -t files < <(find scripts -type f -name '*.sh' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          bash -n "${files[@]}"

  website-worker-checks:
    name: Website Worker Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        run: npm -C apps/website-worker install --no-audit --no-fund

      - name: Type check worker
        run: npm -C apps/website-worker run types

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - sdk-checks
      - docs-checks
      - script-checks
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose version
        run: docker compose version

      - name: Compose up
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml up -d --build

      - name: Wait for health
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run integration script
        env:
          SERVIFY_URL: http://localhost:8080
          WEKNORA_URL: http://localhost:9000
        run: |
          chmod +x scripts/test-weknora-integration.sh
          ./scripts/test-weknora-integration.sh

      - name: Dump compose logs
        if: failure()
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml logs --no-color

      - name: Compose down
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml down -v

  deploy-website-worker:
    name: Deploy Website Worker
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - sdk-checks
      - docs-checks
      - website-worker-checks
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check secrets
        id: gate
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Detect website changes
        if: steps.gate.outputs.skip == 'false'
        id: detect
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$before" "$after" | grep -E '^(apps/website/|apps/website-worker/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        run: npm -C apps/website-worker install --no-audit --no-fund

      - name: Deploy to Cloudflare Workers
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        run: npx wrangler deploy --config apps/website-worker/wrangler.toml

  deploy-website-pages:
    name: Deploy Website Pages
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - sdk-checks
      - docs-checks
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT || 'servify-website' }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check secrets
        id: gate
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Detect website changes
        if: steps.gate.outputs.skip == 'false'
        id: detect
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$before" "$after" | grep -E '^apps/website/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.skip == 'false' && steps.detect.outputs.changed == 'true'
        run: npx wrangler pages deploy apps/website --project-name "$CF_PAGES_PROJECT"
