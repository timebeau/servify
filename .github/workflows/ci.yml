name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup Go
        timeout-minutes: 3
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Verify formatting
        timeout-minutes: 2
        run: |
          mapfile -t files < <(git ls-files '*.go')
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          unformatted=$(gofmt -l "${files[@]}")
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go mod tidy check
        timeout-minutes: 5
        run: |
          go -C apps/server mod tidy
          git diff --exit-code -- go.work.sum apps/server/go.mod apps/server/go.sum

      - name: Go vet
        timeout-minutes: 2
        run: go -C apps/server vet ./...

      - name: Run unit tests with coverage
        timeout-minutes: 10
        env:
          TEST_COVERAGE_TARGET: "5"
        run: ./scripts/run-tests.sh

      - name: Run Go race tests
        timeout-minutes: 10
        env:
          CGO_ENABLED: "1"
        run: ./scripts/run-go-race-tests.sh

      - name: Upload test artifacts
        timeout-minutes: 3
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: go-test-results
          path: scripts/test-results
          if-no-files-found: ignore

      - name: Build server binaries
        timeout-minutes: 15
        run: make build

      - name: Build WeKnora CLI
        timeout-minutes: 15
        run: make build-weknora

  module-checks:
    name: Module Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup Go
        timeout-minutes: 3
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Test modular packages
        timeout-minutes: 10
        run: |
          go test \
            ./apps/server/internal/modules/... \
            ./apps/server/internal/platform/... \
            ./apps/server/internal/services/... \
            ./apps/server/internal/handlers/...

      - name: Build modular entrypoints
        timeout-minutes: 15
        run: |
          go build \
            ./apps/server/internal/modules/... \
            ./apps/server/internal/services \
            ./apps/server/internal/handlers \
            ./apps/server/cmd/server

  sdk-checks:
    name: SDK Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup Node
        timeout-minutes: 3
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        timeout-minutes: 5
        run: npm -C sdk ci --no-audit --no-fund

      - name: Lint SDK
        timeout-minutes: 2
        run: npm -C sdk run lint

      - name: Build SDK
        timeout-minutes: 15
        run: npm -C sdk run build

      - name: Typecheck SDK
        timeout-minutes: 5
        run: npm -C sdk run typecheck

      - name: Test SDK
        timeout-minutes: 10
        run: npm -C sdk run test

      - name: Sync SDK to demo-sdk
        timeout-minutes: 2
        run: |
          chmod +x scripts/sync-sdk-to-demo.sh
          ./scripts/sync-sdk-to-demo.sh

      - name: Verify generated assets manifest
        timeout-minutes: 2
        run: |
          chmod +x scripts/verify-generated-assets.sh
          ./scripts/verify-generated-assets.sh

      - name: Verify generated assets are committed
        timeout-minutes: 2
        run: |
          chmod +x scripts/check-generated-drift.sh
          ./scripts/check-generated-drift.sh \
            "SDK generated assets" \
            "sh scripts/regenerate-generated-assets.sh" \
            apps/demo-sdk

  docs-checks:
    name: Docs Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup Go
        timeout-minutes: 3
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Setup Node
        timeout-minutes: 3
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        timeout-minutes: 5
        run: npm -C docs ci --no-audit --no-fund

      - name: Verify docs lockfile is committed
        timeout-minutes: 2
        run: |
          chmod +x scripts/check-generated-drift.sh
          ./scripts/check-generated-drift.sh \
            "Docs lockfile" \
            "npm -C docs ci --no-audit --no-fund" \
            docs/package-lock.json

      - name: Generate API docs
        timeout-minutes: 10
        run: go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g apps/server/cmd/server/main.go -o docs/generated/api

      - name: Build docs site
        timeout-minutes: 15
        run: npm -C docs run build

      - name: Verify docs generated assets are committed
        timeout-minutes: 2
        run: |
          chmod +x scripts/check-generated-drift.sh
          ./scripts/check-generated-drift.sh \
            "Docs generated assets" \
            "sh scripts/regenerate-generated-assets.sh" \
            docs/generated/api \
            docs/package-lock.json

      - name: Upload docs artifact
        timeout-minutes: 3
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docs-site
          path: docs/.vuepress/dist
          if-no-files-found: ignore

  script-checks:
    name: Script Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Validate shell syntax
        timeout-minutes: 2
        run: |
          mapfile -t files < <(find scripts -type f -name '*.sh' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            exit 0
          fi
          bash -n "${files[@]}"

      - name: Verify provider acceptance scripts
        timeout-minutes: 5
        run: |
          go test ./scripts -run "Test(WeKnoraIntegrationScript(RealModeRejectsLocalHost|MockModeWritesEvidence)|DifyIntegrationScript(RealModeRejectsLocalHost|MockModeWritesEvidence))$"

      - name: Validate repository hygiene
        timeout-minutes: 2
        run: |
          chmod +x scripts/check-repo-hygiene.sh
          ./scripts/check-repo-hygiene.sh

      - name: Install ripgrep
        timeout-minutes: 5
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Validate module boundaries
        timeout-minutes: 2
        run: |
          chmod +x scripts/check-module-boundaries.sh
          ./scripts/check-module-boundaries.sh

  smoke-checks:
    name: Smoke Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup Go
        timeout-minutes: 3
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Setup Node
        timeout-minutes: 3
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        timeout-minutes: 5
        run: npm -C sdk ci --no-audit --no-fund

      - name: Run smoke suite
        timeout-minutes: 10
        run: |
          chmod +x scripts/run-smoke-tests.sh
          ./scripts/run-smoke-tests.sh

  admin-checks:
    name: Admin Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Setup Node
        timeout-minutes: 3
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        timeout-minutes: 3
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Get pnpm store directory
        timeout-minutes: 1
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        timeout-minutes: 3
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('apps/admin/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install admin dependencies
        timeout-minutes: 5
        run: pnpm --dir apps/admin install --frozen-lockfile

      - name: Build admin frontend
        timeout-minutes: 15
        run: pnpm --dir apps/admin run build

      - name: Upload admin build artifact
        timeout-minutes: 3
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: admin-dist
          path: apps/admin/dist
          if-no-files-found: warn

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - sdk-checks
      - docs-checks
      - script-checks
      - smoke-checks
      - admin-checks
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v5

      - name: Compose version
        timeout-minutes: 1
        run: docker compose version

      - name: Compose up
        timeout-minutes: 10
        env:
          JWT_SECRET: dev-secret-key-change-in-production
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml up -d --build

      - name: Wait for health
        timeout-minutes: 5
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run integration script
        timeout-minutes: 10
        env:
          SERVIFY_URL: http://localhost:8080
          WEKNORA_URL: http://localhost:9000
          JWT_SECRET: dev-secret-key-change-in-production
        run: |
          chmod +x scripts/test-weknora-integration.sh
          ./scripts/test-weknora-integration.sh

      - name: Dump compose logs
        timeout-minutes: 2
        if: failure()
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml logs --no-color

      - name: Compose down
        timeout-minutes: 3
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.weknora.yml down -v
