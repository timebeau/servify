name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - '.github/workflows/website-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/website-worker/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/website-worker
          npm ci

      - name: Deploy to Cloudflare Workers
        run: |
          cd apps/website-worker
          # Generate routes.toml with zone_id from environment variable
          echo 'routes = [' > routes.toml
          echo "  { pattern = \"www.servify.cloud/*\", zone_id = \"$CLOUDFLARE_ZONE_ID\" }" >> routes.toml
          echo "  { pattern = \"servify.cloud/*\", zone_id = \"$CLOUDFLARE_ZONE_ID\" }" >> routes.toml
          echo ']' >> routes.toml
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
