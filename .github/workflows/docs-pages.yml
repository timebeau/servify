name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        timeout-minutes: 3
        uses: actions/checkout@v6

      - name: Setup Node
        timeout-minutes: 3
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Setup Go
        timeout-minutes: 3
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: |
            apps/server/go.sum
            go.work.sum

      - name: Install docs dependencies
        timeout-minutes: 5
        run: npm -C docs ci --no-audit --no-fund

      - name: Generate API docs
        timeout-minutes: 10
        run: go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g apps/server/cmd/server/main.go -o docs/generated/api

      - name: Build docs
        timeout-minutes: 15
        run: npm -C docs run build

      - name: Configure Pages
        timeout-minutes: 3
        uses: actions/configure-pages@v6

      - name: Upload Pages Artifact
        timeout-minutes: 3
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        timeout-minutes: 3
        id: deployment
        uses: actions/deploy-pages@v5
