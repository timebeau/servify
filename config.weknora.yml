# 更新后的配置文件 - 外部知识库 provider 示例（Dify 优先，WeKnora 兼容）

server:
  host: 0.0.0.0
  port: 8080

database:
  host: localhost
  port: 5432
  user: postgres
  password: password
  name: servify
  # 新增：连接池配置
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600s

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  # 新增：连接池配置
  pool_size: 10
  min_idle_conns: 5

# 现有 AI 配置
ai:
  openai:
    api_key: ""
    base_url: "https://api.openai.com/v1"
    model: "gpt-3.5-turbo"
    temperature: 0.7
    max_tokens: 1000
    timeout: 30s

dify:
  enabled: true
  base_url: "https://api.dify.example/v1"
  api_key: ""
  dataset_id: ""
  timeout: 30s
  search:
    top_k: 5
    score_threshold: 0.7
    search_method: "semantic_search"
    reranking_enable: false

# 兼容：WeKnora 配置
weknora:
  enabled: false  # 仅在兼容/回退验收时启用
  base_url: "http://localhost:9000"
  api_key: "default-api-key"
  tenant_id: "default-tenant"
  knowledge_base_id: "default-kb"
  timeout: 30s
  max_retries: 3

  # 检索配置
  search:
    default_limit: 5
    score_threshold: 0.7
    strategy: "hybrid"  # "bm25", "vector", "hybrid", "graph"

  # 健康检查配置
  health_check:
    interval: 30s
    timeout: 10s

# 新增：降级策略配置
fallback:
  enabled: true
  legacy_kb_enabled: true

  # 熔断器配置
  circuit_breaker:
    enabled: true
    max_failures: 5
    reset_timeout: 60s
    half_open_max_requests: 3

# 现有配置
webrtc:
  stun_server: "stun:stun.l.google.com:19302"

jwt:
  secret: "default-secret-key"
  expires_in: "24h"

portal:
  brand_name: "Servify"
  logo_url: ""
  primary_color: "#4299e1"
  secondary_color: "#764ba2"
  default_locale: "zh-CN"
  locales: ["zh-CN","en-US"]
  support_email: ""

log:
  level: "info"
  format: "json"  # "json" or "text"
  output: "both"  # "stdout", "file", or "both"
  file_path: "./logs/servify.log"
  max_size: 100   # MB
  max_age: 7      # days
  max_backups: 3
  compress: true

# 新增：监控配置
monitoring:
  enabled: true
  metrics_path: "/metrics"

  # 性能指标
  performance:
    slow_query_threshold: 1s
    enable_request_logging: true

  # 健康检查
  health_checks:
    database: true
    redis: true
    knowledge_provider: true
    weknora: true
    openai: false  # 可选，避免频繁调用

# 新增：安全配置
security:
  cors:
    enabled: true
    allowed_origins: ["*"]  # 生产环境应限制
    allowed_methods: ["GET", "POST", "PUT", "DELETE"]
    allowed_headers: ["*"]

  # 新增：细粒度 RBAC（资源级权限）
  rbac:
    enabled: true
    roles:
      admin: ["*"]
      agent:
        - "tickets.read"
        - "tickets.write"
        - "customers.read"
        - "agents.read"
        - "knowledge.read"
        - "assist.read"
        - "gamification.read"
        - "custom_fields.read"
        - "session_transfer.read"
        - "session_transfer.write"
        - "satisfaction.read"
        - "satisfaction.write"
        - "workspace.read"
        - "macros.read"
        - "integrations.read"

  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst: 10
    # 使用 Header 值作为限流 Key（可选：X-API-Key / X-Forwarded-For）
    key_header: "X-API-Key"
    whitelist_ips: ["127.0.0.1"]
    whitelist_keys: ["internal-test-key"]
    # 可选：按路径覆盖（前缀匹配，优先匹配）
    paths:
      - enabled: true
        prefix: "/api/v1/auth/"
        requests_per_minute: 25
        burst: 10
      - enabled: true
        prefix: "/api/v1/ai/query"
        requests_per_minute: 30
        burst: 10
      - enabled: true
        prefix: "/uploads/"
        requests_per_minute: 90
        burst: 20
      - enabled: true
        prefix: "/api/v1/metrics/ingest"
        requests_per_minute: 120
        burst: 30
      - enabled: true
        prefix: "/api/"
        requests_per_minute: 60
        burst: 15

# 新增：文件上传配置（支持外部 knowledge provider 文档上传）
upload:
  enabled: true
  max_file_size: "10MB"
  allowed_types: [".pdf", ".docx", ".txt", ".md", ".png", ".jpg", ".jpeg"]
  storage_path: "./.runtime/uploads"

  # 外部 knowledge provider 文档处理
  auto_process: true
  auto_index: true
