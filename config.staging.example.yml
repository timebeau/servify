# Example staging-oriented baseline.
# Keep secrets injected from environment, but allow staging-specific origins and labels.

server:
  environment: "staging"

event_bus:
  # For staging, you can use "inmemory" for simplicity or "redis" for production parity.
  provider: "redis"

voice:
  recording_provider: "disabled"
  transcript_provider: "disabled"

jwt:
  secret: "${SERVIFY_JWT_SECRET}"
  expires_in: "12h"

security:
  cors:
    enabled: true
    allowed_origins:
      - "https://staging-app.example.com"
      - "https://staging-ops.example.com"
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed_headers: ["Authorization", "Content-Type", "X-Request-ID"]
  rbac:
    enabled: true
  rate_limiting:
    enabled: true
    requests_per_minute: 180
    burst: 45
    key_header: ""
    whitelist_ips: []
    whitelist_keys: []
    paths:
      - enabled: true
        prefix: "/public/"
        requests_per_minute: 180
        burst: 45
      - enabled: true
        prefix: "/public/kb/"
        requests_per_minute: 90
        burst: 20
      - enabled: true
        prefix: "/public/csat/"
        requests_per_minute: 45
        burst: 10
      - enabled: true
        prefix: "/api/v1/auth/"
        requests_per_minute: 30
        burst: 15
      - enabled: true
        prefix: "/api/v1/ws"
        requests_per_minute: 60
        burst: 30
      - enabled: true
        prefix: "/uploads/"
        requests_per_minute: 120
        burst: 30
      - enabled: true
        prefix: "/api/v1/ai/query"
        requests_per_minute: 60
        burst: 20
      - enabled: true
        prefix: "/api/v1/ai/knowledge/"
        requests_per_minute: 15
        burst: 5
      - enabled: true
        prefix: "/api/v1/metrics/ingest"
        requests_per_minute: 240
        burst: 80
      - enabled: true
        prefix: "/api/"
        requests_per_minute: 120
        burst: 30
  audit:
    enabled: true
    retention: 2160h
    cleanup_interval: 24h
    cleanup_batch_size: 500
  session_risk:
    hot_refresh_window_minutes: 10
    recent_refresh_window_minutes: 30
    today_refresh_window_hours: 24
    rapid_change_window_hours: 12
    stale_activity_window_days: 14
    multi_public_ip_threshold: 3
    many_sessions_threshold: 4
    hot_refresh_family_threshold: 2
    medium_risk_score: 2
    high_risk_score: 5
  session_risk_profiles:
    staging:
      hot_refresh_window_minutes: 10
      recent_refresh_window_minutes: 30
      rapid_change_window_hours: 12
      stale_activity_window_days: 14
      high_risk_score: 5
  session_ip_intelligence:
    enabled: false
    base_url: "https://geo-staging.example.com/lookup/{ip}"
    api_key: "${SESSION_IP_API_KEY}"
    auth_header: "Authorization"
    timeout_ms: 1500

ai:
  openai:
    api_key: "${OPENAI_API_KEY}"

dify:
  enabled: true
  base_url: "https://dify-staging.example.com/v1"
  api_key: "${DIFY_API_KEY}"
  dataset_id: "${DIFY_DATASET_ID}"

weknora:
  enabled: false
  api_key: "${WEKNORA_API_KEY}"

log:
  level: "info"
  format: "json"
  output: "both"

monitoring:
  enabled: true
  health_checks:
    knowledge_provider: true
    weknora: true
